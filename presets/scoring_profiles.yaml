# presets/scoring_profiles.yaml — 업종별 입지 점수 산출 프로파일
# weights 합계 반드시 1.0
#
# competition_mode:
#   avoid    — 경쟁업체 존재 자체가 강한 페널티 (편의점·마트형)
#   tolerate — 선형 페널티 (기본)
#   cluster  — threshold 이하 집적 구간은 패널티 없음, 초과 시 선형 증가 (카페·음식점 거리)
#
# demographic_target:
#   all / children / elderly / young_adult
#
# diversity 가중치 설계 원칙:
#   - 상업 집적지 의존 업종(카페·음식점·미용) → 높음 (0.10~0.15)
#     → 다양한 업종이 밀집할수록 유동인구 흡인력 상승
#   - 독립 입지 업종(마트·편의점·병원) → 낮음 (0.00~0.05)
#     → 상권 다양성보다 배후 인구가 핵심
#
# parking 가중치 설계 원칙:
#   - 차량 방문 필수 업종(마트·취미 공방) → 높음 (0.10~0.15)
#   - 도보·대중교통 중심 업종(편의점·카페) → 낮음 (0.00~0.05)

# ─── 프리셋 6종 ─────────────────────────────────────────

