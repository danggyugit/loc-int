# presets/scoring_profiles.yaml — 업종별 입지 점수 산출 프로파일 (9팩터)
# weights 합계 반드시 1.0
#
# competition_mode:
#   avoid    — 경쟁업체 존재 자체가 강한 페널티 (편의점·마트형)
#   tolerate — 선형 페널티 (기본)
#   cluster  — threshold 이하 집적 구간은 패널티 없음, 초과 시 선형 증가 (카페·음식점 거리)
#
# demographic_target:
#   all / children / elderly / young_adult
#
# commercial 가중치 설계 원칙:
#   - 임차형 업종(카페·음식점·미용) → 높음 (0.08~0.10) : 상가건물 필요
#   - 자가/독립 업종(마트·병원) → 낮음 (0.03~0.05) : 자체 건물
#
# road_quality 가중치 설계 원칙:
#   - 유동인구 의존(카페·편의점·미용) → 높음 (0.08~0.12) : 대로변 가시성 중요
#   - 목적지형(병원·학원·공방) → 낮음 (0.03~0.05) : 이면도로도 가능

# ─── 프리셋 6종 ─────────────────────────────────────────

