# presets/scoring_profiles.yaml — 업종별 입지 점수 산출 프로파일
# weights 합계 반드시 1.0
#
# competition_mode:
#   avoid    — 경쟁업체 존재 자체가 강한 페널티 (편의점·마트형)
#   tolerate — 선형 페널티 (기본)
#   cluster  — threshold 이하 집적 구간은 패널티 없음, 초과 시 선형 증가 (카페·음식점 거리)
#
# competition_threshold (0.0~1.0):
#   cluster 모드에서 페널티 없는 정규화 경쟁 밀도 상한
#   예: 0.3 → 하위 30% 경쟁 밀도 셀은 패널티 없음
#
# traffic_type:  floating | destination | mixed  (표시 및 분류용)
#
# demographic_target:
#   all          — 전 연령 (보정 없음)
#   children     — 유소년(0~14세) 비율 높은 지역 선호
#   elderly      — 고령(65세+) 비율 높은 지역 선호
#   young_adult  — 생산가능인구(15~64세) 비율 높은 지역 선호
#
# parking 가중치 설계 원칙:
#   - 차량 방문 필수 업종(마트·취미 공방) → 높음 (0.10~0.15)
#   - 도보·대중교통 중심 업종(편의점·카페) → 낮음 (0.00~0.05)
#
# workplace 가중치 설계 원칙:
#   - 오피스 밀집 지역 의존도 높은 업종(카페·사무서비스) → 높음 (0.15~0.25)
#   - 주거지 기반 업종(학원·마트·반려동물) → 낮음 (0.05)
#   - 혼합형 업종(음식점·피트니스) → 중간 (0.10~0.15)

# ─── 프리셋 6종 ─────────────────────────────────────────

