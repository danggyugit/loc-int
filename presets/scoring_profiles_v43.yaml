# presets/scoring_profiles_v43.yaml — 11팩터 업종별 입지 점수 산출 프로파일
# weights 합계 반드시 1.0
#
# v4.3 추가 팩터 (v4.2 대비):
#   commercial   — 상가건물 밀도. 양의 기여 (임차형 업종에 중요)
#   road_quality — 도로 접근성/가시성. 양의 기여 (대로변 유동인구 의존 업종에 중요)
#   zone_score   — 용도지역 적합도. 하드 필터 (가중치가 아닌 곱셈 필터)
#
# v4.2 계승:
#   income — 소득 수준 (아파트매매 평균가 proxy). 양의 기여
#   rent   — 임대 비용 (월세 수준). 음의 기여
#
# commercial 가중치 설계 원칙:
#   - 임차형 업종(카페·음식점·미용) → 높음 (0.06~0.08) : 상가건물 필요
#   - 자가/독립 업종(마트·병원) → 낮음 (0.02~0.03) : 자체 건물
#
# road_quality 가중치 설계 원칙:
#   - 유동인구 의존(카페·편의점·미용) → 높음 (0.05~0.07) : 대로변 가시성 중요
#   - 목적지형(병원·학원·공방) → 낮음 (0.02~0.04) : 이면도로도 가능
#
# competition_mode: avoid / tolerate / cluster
# demographic_target: all / children / elderly / young_adult / children_and_parent

